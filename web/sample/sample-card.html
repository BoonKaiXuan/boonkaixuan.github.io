<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>card</title>
    <link rel="stylesheet" href="../css/common/card.css">
    <link rel="stylesheet" a href="../css/common/variables.css">
    <link rel="stylesheet" a href="../css/common/button.css">
    <link rel="stylesheet" a href="../css/common/layout.css">

                        <p>3 On-sale products</p>

                    </div>
                    <div class="width-30">

                    </div>

            </div>

        <section>
            <div class="gap-40 row-flex">
                <div class="card card_with-border ">

                    <div class="text-center">Cat food </div>
                </div>
            </div>
        </section>

        <section>
            <div class="row-flex gap-20">
                <div class="col-3 ratio-2-3 card category bg-img col-1-m direction-col text-center space-between"
                    style="--bg: url('../../images/blog-8\ 2.png')">
                    <h2 class="text-white">Dog Food</h2>
                    <div><button class="btn"><a href="https://google.com">Button Green</a></button></div>
                </div>
            </div>
