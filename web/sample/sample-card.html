<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>card</title>
    <link rel="stylesheet" href="../css/common/card.css">
    <link rel="stylesheet" a href="../css/common/variables.css">
    <link rel="stylesheet" a href="../css/common/button.css">
    <link rel="stylesheet" a href="../css/common/layout.css">
    <link rel="stylesheet" a href="../css/common/typography.css">
    <link rel="stylesheet" a href="../css/common/image.css">



</head>

<body>
    <div id="main">
        <section>
            <div class="gap-40 row-flex">
                <div class=" card card_with-border">
                    <div><img src="../images/card img.png" alt="card" width="100%"></div>
                    <div class="direction-col gap-20">
                        <div class="row-flex gap-12">
                            <div>April 19st, 2020 </div>
                            <div>Tips & Tricks</div>
                        </div>
                        <h5>How to ‘loose leash walk’ your dog </h5>
                        <div class="text-light-green">Continue Reading</div>
                    </div>
                </div>
            </div>
            <section>
                <div class="row-flex gap-0 text-white">
                    <div class="col-3 col-1-t on-sale-item card_dark-green">
                        <div>
                            <p>3 On-sale products</p>
                            <p class="text-light-green">Star Rating</p>
                            <p class="text-bold">RM18.00</p>
                        </div>
                        <div class="width-30">
                            <img src="https://avada.website/pet-supplies/wp-content/uploads/sites/139/2020/04/product-22-600x600.jpg"
                                alt="Product Image" width="100%">
                        </div>
                    </div>
                    <div class="col-3 col-1-t on-sale-item card_mid-green">
                        <div>
                            <p>3 On-sale products</p>
                            <p class="text-light-green">Star Rating</p>
                            <p class="text-bold">RM18.00</p>
                        </div>
                        <div class="width-30">
                            <img src="https://avada.website/pet-supplies/wp-content/uploads/sites/139/2020/04/product-22-600x600.jpg"
                                alt="Product Image" width="100%">
                        </div>
                    </div>
                    <div class="col-3 col-1-t on-sale-item card_dark-green">
                        <div>
                            <p>3 On-sale products</p>
                            <p class="text-light-green">Star Rating</p>
                            <p class="text-bold">RM18.00</p>
                        </div>
                        <div class="width-30">
                            <img src="https://avada.website/pet-supplies/wp-content/uploads/sites/139/2020/04/product-22-600x600.jpg"
                                alt="Product Image" width="100%">
                        </div>
                    </div>
                </div>
            </section>

            <div class="gap-40 row-flex">
                <div class="card card_with-border">
                    <div><img src="../images/card img.png" alt="card" width="100%"></div>
                    <div class="explore-more">
                        <div>Cat food </div>
                    </div>
                </div>
            </div>
        </section>

        <div class="row-flex gap-20 text-white">
            <div class="col-3 ratio-2-3 category bg-img col-1-m" style="--bg: url('../images/blog-8\ 2.png')">

                <h2>Dog Food</h2>
                <div></div><button class="btn"><a href="https://google.com">Button Green</a></button>
            </div>
        </div>

        <section>
            <div class="card_without-border row-flex gap-12">
                <div><img src="../images/dry-food 2.png" alt="card" width="100%"></div>
                <div>Allabama dry dog food 5kg</div>
                <div class="text-light-green">RM35.00</div>
            </div>
        </section>
        <section>
            <div class="background-image-dark row-flex">
                <div>How to build trust with your pet?</div>
            </div>
        </section>
    </div>
</body>

</html>
