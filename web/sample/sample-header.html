<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sample - Header</title>
    <link rel="stylesheet" a href="../css/common/variables.css">
    <link rel="stylesheet" a href="../css/common/typography.css">
    <link rel="stylesheet" a href="../css/common/layout.css">
    <link rel="stylesheet" a href="../css/common/header.css">
    <script src="https://kit.fontawesome.com/1619a0e9db.js" crossorigin="anonymous"></script>
</head>

<body>
    <h2 class="text-center">Navigation Menu</h2>
    <div id="header">
        <div class="header_topbar row-flex align-items-center">
            <div>
                <a>
                    <img src="../images/furever-friends-logo-big.svg" alt="Furever Friends Logo" height="36">
                </a>
            </div>

            <div>
                <input class="search-bar" type="text" placeholder="Search..." />
            </div>

            <div>
                <span class="text-bold">Questions?</span> Call us: (+60)147895478
            </div>

            <div>
                <div>
                    <a href="https://www.google.com">

                    </a>
                </div>
                <div>
                    <a href="https://www.google.com">
                        <i class="fa-regular fa-user" style="color: #000000;"></i>
                    </a>
                </div>
            </div>

        </div>

        <div class="navbar row-flex">
            <div class="menu-item">
                <a href="https://www.google.com">Home</a>
            </div>
            <div class="menu-item menu-item-dropdown">
                <a href="https://www.google.com">Shop</a>
            </div>
            <div class="menu-item">
                <a href="https://www.google.com">About</a>
            </div>
            <div class="menu-item">
                <a href="https://www.google.com">Contact</a>
            </div>
        </div>

        <div class="header_bottombar row-flex align-items-center">
            <div class="row-flex gap-4">
                <img src="../images/icon_map.png" alt="Map Icon" width="24">
                Free shipping over RM100
            </div>
            <div class="row-flex gap-4">
                <img src="../images/icon_discount.png" alt="Discount Icon" width="24">
                10% Off First Order
            </div>
            <div class="row-flex gap-4">
                <img src="../images/icon_track-order.png" alt="Track Order Icon" width="24">
                Track Your Order
            </div>
        </div>
    </div>

</body>

</html>
