<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sample - Header</title>
    <link rel="stylesheet" a href="../css/common/variables.css">
    <link rel="stylesheet" a href="../css/common/typography.css">
    <link rel="stylesheet" a href="../css/common/layout.css">
    <link rel="stylesheet" a href="../css/common/header.css">
    <script src="https://kit.fontawesome.com/1619a0e9db.js" crossorigin="anonymous"></script>
</head>

<body>
    <h2 class="text-center">Navigation Menu</h2>
    <div id="header" class="padding-default">
        <div class="header_topbar row-flex">
            <div>
                <img src="https://avada.website/pet-supplies/wp-content/uploads/sites/139/2021/05/petsupplies-svg-logo-2.svg"
                    alt="Furever Friends Logo" height="36">
            </div>
            <div>
                <input class="search-bar" type="text" placeholder="Search..." />
            </div>
            <div>
                Questions? Call us: (+60)147895478
            </div>
            <div>
                <img class="icon" src="../images/styleguide/icon_shopping-bag.png" alt="Shopping Bag Icon" width="42">
                <img class="icon" src="../images/styleguide/icon_acc.png" alt="Shopping Bag Icon" width="42">
            </div>
        </div>
        <div class="navbar row-flex">
            <div class="menu-item">
                <a href="">Home</a>
            </div>
            <div>
                <a href="">Shop</a>
            </div>
            <div class="menu-item">
                <a href="">About</a>
            </div>
            <div class="menu-item">
                <a href="">Contact</a>
            </div>
        </div>
        <div class="header_utility row-flex">
            <div class="row-flex">
                <img class="icon" src="../images/styleguide/icon_map.png" alt="Map Icon" width="40">
                Free shipping over RM100
            </div>
            <div class="row-flex">
                <img class="icon" src="../images/styleguide/icon_discount.png" alt="Discount Icon" width="40">
                10% Off First Order
            </div>
            <div class="row-flex">
                <img class="icon" src="../images/styleguide/icon_track-order.png" alt="Track Order Icon" width="40">
                Track Your Order
            </div>
        </div>
    </div>
</body>

</html>
