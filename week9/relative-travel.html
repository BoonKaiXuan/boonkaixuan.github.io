<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Week9 Exe 2 - Relative-travel</title>
    <link rel="stylesheet" a href="css/relative-travel.css">
</head>

<body>
    <div id="max-width-container">
        <section>
            <div class="container">
                <div class="card">
                    <div class="venue-img">
                        <img src="images/greece.jpg" alt="Photo of Acropolis of Athens" width="100%">
                    </div>
                    <div>
                        <h2>Trip To Greece</h2>
                        <p>14-29 June | by Robbin Henderson</p>
                    </div>
                    <div class="functions-icons">
                        <img src="images/icon_leaf.png" alt="Leaf Icon" width="24">
                        <img src="images/icon_map.png" alt="Map Icon" width="24">
                        <img src="images/icon_send.png" alt="Send Icon" width="24">
                    </div>
                    <div class="card_bottom-bar">
                        <div class="visitor-number">
                            <img src="images/icon_building.png" alt="Building Icon" width="24">
                            <p>24 people going</p>
                        </div>
                        <div>
                            <img src="images/icon_like.png" alt="Like Icon" width="24">
                        </div>
                    </div>
                </div>
                <div class="overlay">
                    <div>
                        <img src="images/rome.jpg" alt="Photo of Colosseum" width="56">
                    </div>
                    <div>
                        <p>Ongoing</p>
                        <h2>Trip To Rome</h2>
                        <p class="progress-text"><span>40%</span> completed</p>
                        <div class="progress-bar">
                            <div>40%</div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="container">
                <div class="card">
                    <div class="venue-img">
                        <img src="images/parthenon.jpg" alt="Photo of Parthenon" width="100%">
                    </div>
                    <div>
                        <h2>Trip To Greece</h2>
                        <p>14-29 June | by Robbin Henderson</p>
                    </div>
                    <div class="functions-icons">
                        <img src="images/icon_leaf.png" alt="Leaf Icon" width="24">
                        <img src="images/icon_map.png" alt="Map Icon" width="24">
                        <img src="images/icon_send.png" alt="Send Icon" width="24">
                    </div>
                    <div class="card_bottom-bar">
                        <div class="visitor-number">
                            <img src="images/icon_building.png" alt="Building Icon" width="24">
                            <p>24 people going</p>
                        </div>
                        <div>
                            <img src="images/icon_like.png" alt="Like Icon" width="24">
                        </div>
                    </div>
                </div>
                <div class="overlay">
                    <div>
                        <img src="images/rome-2.jpg" alt="Photo of The Trevi Fountain" width="56">
                    </div>
                    <div>
                        <p>Ongoing</p>
                        <h2>Trip To Rome</h2>
                        <p class="progress-text"><span>40%</span> completed</p>
                        <div class="progress-bar">
                            <div>40%</div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </div>
</body>

</html>
