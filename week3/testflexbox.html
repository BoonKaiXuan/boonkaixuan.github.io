<html lang="en">

<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div.container {
            display: flex;
            flex-direction: column;
            /*distance between child elements*/
            gap: 10px;
            /*horizontal alignment*/

            justify-content: end;
            */

            /*vertical alignment*/
            align-items: center;
            min-height: 300px;
            /*
            background: linear-gradient(to top, rgb(199, 199, 245), rgb(131, 161, 231));
            */
            background-image: url(images/winter.jpg);
            background-position: center;
            background-size: cover;
            padding: 20px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div>Item 1</div>
        <div>Item 2</div>
        <div>Item 3</div>
        <div>Item 4</div>
        <div>Item 5</div>
    </div>

</html>
