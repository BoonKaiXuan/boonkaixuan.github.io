<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Week3 Exe1 - Flexbox</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Oxygen:wght@300;400;700&display=swap');

        body {
            background-color: #F6F5EF;
            font-family: "Oxygen", sans-serif;
            margin: 50px;
        }

        h2 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 12px;
        }

        p {
            color: rgb(100, 100, 99);
            font-size: 14px;
            line-height: 1.5;
        }


        div.services {
            display: flex;
            align-items: stretch;
            gap: 30px;
            margin: auto;
            max-width: 1024px;

        }

        div.service_list {
            background-color: white;
            border-radius: 15px;
            padding: 20px 20px 40px;
        }

        div.service_img img {
            border-radius: 5px;
        }
    </style>
</head>

<body>
    <div class="services">
        <div class="service_list residential">
            <div class="service_img">
                <img src="images/residential.jpg" alt="Photo of residential buildings" width="100%">
            </div>
            <div class="resi_intro">
                <h2>
                    Residential projects
                </h2>
                <p>
                    We build sustainable and modern homes for comfortable living.
                </p>
            </div>
        </div>
        <div class="service_list commercial">
            <div class="service_img">
                <img src="images/commercial.jpg" alt="Photo of a workspace corner" width="100%">
            </div>
            <div class="commercial_intro">
                <h2>
                    Commercial spaces
                </h2>
                <p>
                    We create efficient, inspiring workspaces for businesses of all sizes.
                </p>
            </div>
        </div>
        <div class="service_list infrastructure">
            <div class="service_img">
                <img src="images/infrastructure.jpg" alt="Photo of a house" width="100%">
            </div>
            <div class="infra_intro">
                <h2>
                    Infrastructure works
                </h2>
                <p>
                    We develop strong, reliable infrastructure for growing communities.
                </p>
            </div>
        </div>
    </div>
</body>

</html>
