<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox</title>
    <style>
        body {
            background-color: #F6F5EF;
            font-family: Oxygen, sans-serif;
        }

        div.services {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        div.residential {
            background-color: white;
            border-radius: 10px;
        }

        div.commercial {
            background-color: white;
            border-radius: 10px;
        }

        div.infrastructure {
            background-color: white;
            border-radius: 10px;
        }
    </style>
</head>

<body>
    <div class="services">
        <div class="residential">
            <div class="img_residential">
            </div>
            <h2>
                Residential projects
            </h2>
            <p>
                We build sustainable and modern homes for comfortable living.
            </p>
        </div>
        <div class="commercial">
            <div class="img_commercial"></div>
            <h2>
                Commercial spaces
            </h2>
            <p>
                We create efficient, inspiring workspaces for businesses of all sizes.
            </p>
        </div>
        <div class="infrastructure">
            <div class="img_infrastructure"></div>
            <h2>
                Infrastructure works
            </h2>
            <p>
                We develop strong, reliable infrastructure for growing communities.
            </p>
        </div>
    </div>
</body>

</html>
