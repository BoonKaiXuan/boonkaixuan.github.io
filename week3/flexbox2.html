<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Positivus Home</title>
    <style>
        body {
            margin: 30px 80px;
            font-family: Arial, sans-serif;
            font-size: 18px;
        }

        div.header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 50px;
        }

        div.logo {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        div.menu_container {
            display: flex;
            align-items: center;
            gap: 50px;
        }

        div.quote {
            border: black solid 1px;
            border-radius: 10px;
            padding: 15px;
        }

        div.hero_section {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        div.intro {
            max-width: 30%;
        }
    </style>
</head>

<body>
    <div class="header">
        <div class="logo">
            <img src="images/positivus_logo.svg" alt="Positivus Logo" width="35px">
            <h1>Positivus</h1>
        </div>
        <div class="menu_container">
            <div class="menu_item">About us</div>
            <div class="menu_item">Services</div>
            <div class="menu_item">Use Cases</div>
            <div class="menu_item">Pricing</div>
            <div class="menu_item">Blog</div>
            <div class="quote">Request a Quote</div>
        </div>
    </div>
    <div class="hero_section">
        <div class="intro">
            <h1>Navigating the digital landscape for success</h1>
            <p>Our digital marketing agency helps businesses grow and succeed online through a range of services
                including SEO, PPC, social media marketing, and content creation.</p>
        </div>
        <img src="images/hero_img.svg" alt="Illustration of a speaker" width="50%">
    </div>

</body>

</html>
