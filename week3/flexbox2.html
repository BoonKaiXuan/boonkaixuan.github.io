<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Week3 Exe2 - Positivus Home</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap');

        body {
            margin: 30px 120px;
            font-family: "Space Grotesk", sans-serif;
            font-size: 18px;
            line-height: 1.4;
        }

        div.navigation_bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 50px;
        }

        div.logo {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        div.menu_container {
            display: flex;
            align-items: center;
            gap: 50px;
        }


        div.quote {
            border: black solid 1px;
            border-radius: 10px;
            padding: 12px 30px;
        }

        div.hero_section {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 50px;
            margin-bottom: 50px;
        }

        div.hero_intro {
            width: 40%;
        }

        div.hero_img {
            width: 50%;
        }

        h1.title {
            font-size: 56px;
        }

        button.consultation {
            color: white;
            background-color: black;
            padding: 20px 35px;
            border: none;
            border-radius: 14px;
            margin-top: 20px;
            font-family: inherit;
            font-size: inherit;
            /*to use the parent font-family*/
        }

        div.companies_logo {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 30px;
        }

        div.logo_list {
            filter: grayscale(1);
        }
    </style>
</head>

<body>
    <div class="navigation_bar">
        <div class="logo">
            <img src="images/positivus_logo.svg" alt="Positivus Logo" width="35">
            <h1>Positivus</h1>
        </div>
        <div class="menu_container">
            <div class="menu_item">About us</div>
            <div class="menu_item">Services</div>
            <div class="menu_item">Use Cases</div>
            <div class="menu_item">Pricing</div>
            <div class="menu_item">Blog</div>
            <div class="quote">Request a Quote</div>
        </div>
    </div>
    <div class="hero_section">
        <div class="hero_intro">
            <h1 class="title">Navigating the digital landscape for success</h1>
            <p>Our digital marketing agency helps businesses grow and succeed online through a range of services
                including SEO, PPC, social media marketing, and content creation.</p>
            <p><button class="consultation">Book a consultation</button></p>
        </div>
        <div class="hero_img"><img src="images/hero_img.svg" alt="Illustration of a speaker" width="100%"></div>
    </div>
    <div class="companies_logo">
        <div class="logo_list"><img src="images/logo_amazon.svg" alt="Amazon Logo" width="100%"></div>
        <div class="logo_list"><img src="images/logo_dribbble.svg" alt="Dribbble Logo" width="100%"></div>
        <div class="logo_list"><img src="images/logo_hubspot.svg" alt="HubSpot Logo" width="100%"></div>
        <div class="logo_list"><img src="images/logo_notion.svg" alt="Notion Logo" width="100%"></div>
        <div class="logo_list"><img src="images/logo_netflix.svg" alt="Netflix Logo" width="100%"></div>
        <div class="logo_list"><img src="images/logo_zoom.svg" alt="Zoom Logo" width="100%"></div>
    </div>

</body>

</html>
