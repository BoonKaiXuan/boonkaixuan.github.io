<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Week4 Exe1 - Responsive Menu</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,100..900;1,100..900&display=swap');

        #container {
            max-width: 1520px;
            margin: auto;
        }

        body {
            font-family: "Archivo", sans-serif;
            font-size: 16px;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 56px;

        }

        .navbar {
            display: flex;
            align-items: center;
        }

        .navbar_item {
            padding: 0px 15px;
        }

        .contact-menu {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .hotline {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
        }

        .contact_bt {
            background-color: #F9612B;
            color: white;
            font-size: 14px;
            border: none;
            border-radius: 8px;
            padding: 12px 17px;

        }

        .menu {
            display: none;
        }

        @media screen and (max-width:1280px) {

            .navbar {
                display: none;
            }

            .contact_bt {
                display: none;
            }

            .menu {
                display: block;
            }

            .header {
                padding: 10px 15px;
            }
        }

        @media screen and (max-width:765px) {

            .hotline {
                display: none;
            }
        }
    </style>
</head>

<body>
    <div id="container">
        <div class="header">
            <div class="logo">
                <img src="images/logo_elementra.png" alt="Elementra Logo" height="36" width="auto">
            </div>
            <div class="navbar">
                <div class="navbar_item">Home</div>
                <div class="navbar_item">Services</div>
                <div class="navbar_item">Work</div>
                <div class="navbar_item">Project Details</div>
                <div class="navbar_item">Contact</div>
            </div>
            <div class="contact-menu">
                <div class="hotline">
                    <img src="images/phone_icon.png" alt="Phone Icon" width="24" height="auto">
                    555-123-4567
                </div>
                <div class="contact_bt">
                    Contact
                </div>
                <div class="menu">
                    <img src="images/menu_icon.png" alt="Menu Icon" width="24" height="auto">
                </div>
            </div>
        </div>
    </div>

</body>

</html>
